<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Transação | Controle de Gastos</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Controle de Gastos Pessoais</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="lancamentos.html">Lançamentos</a>
                <a href="novo.html">Nova Transação</a>
            </nav>
        </header>

        <main>
            <h2>Editar Lançamento</h2>

            <form id="form-editar" class="form-transacao">
                <input type="hidden" id="edit-id">

                <div class="campo">
                    <label for="edit-descricao">Descrição *</label>
                    <input type="text" id="edit-descricao" required>
                </div>

                <div class="campo">
                    <label for="edit-valor">Valor (R$) *</label>
                    <input type="number" id="edit-valor" step="0.01" min="0.01" required>
                </div>

                <div class="campo">
                    <label for="edit-tipo">Tipo *</label>
                    <select id="edit-tipo" required>
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="edit-categoria">Categoria</label>
                    <input type="text" id="edit-categoria" list="categorias-sugeridas">
                </div>

                <div class="campo">
                    <label for="edit-data">Data *</label>
                    <input type="date" id="edit-data" required>
                </div>

                <div class="botoes-form">
                    <button type="submit" class="btn-primario">Atualizar</button>
                    <button type="button" id="btn-excluir" class="btn-perigo">Excluir</button>
                    <a href="lancamentos.html" class="btn-secundario">Cancelar</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
